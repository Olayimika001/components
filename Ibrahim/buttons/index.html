<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahim's 10 Tailwind Buttons - Dark Blue Theme</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-950 p-8">
    <div class="flex flex-wrap gap-4 items-center justify-center min-h-screen">

        <!-- 1. Primary - Main action (bold, filled) -->
        <button class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 px-6 rounded-lg transition">
            Primary
        </button>

        <!-- 2. Secondary - Less emphasis (outline) -->
        <button
            class="border border-blue-400 text-blue-400 hover:bg-blue-900 font-semibold py-2.5 px-6 rounded-lg transition">
            Secondary
        </button>

        <!-- 3. Tertiary - No background, just text -->
        <button
            class="text-blue-300 hover:text-blue-200 hover:bg-blue-900/50 font-medium py-2.5 px-6 rounded-lg transition">
            Tertiary
        </button>

        <!-- 4. Danger - Destructive actions -->
        <button class="bg-red-600 hover:bg-red-700 text-white font-semibold py-2.5 px-6 rounded-lg transition">
            Danger
        </button>

        <!-- 5. Success - For confirmations -->
        <button class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 px-6 rounded-lg transition">
            Success
        </button>

        <!-- 6. Filled - Solid background -->
        <button class="bg-slate-600 hover:bg-slate-500 text-white font-medium py-2.5 px-6 rounded-lg transition">
            Filled
        </button>

        <!-- 7. Outline - Border only -->
        <button
            class="border border-gray-400 text-gray-300 hover:bg-gray-800 font-medium py-2.5 px-6 rounded-lg transition">
            Outline
        </button>

        <!-- 8. Ghost - Very subtle, appears on hover -->
        <button class="text-gray-300 hover:bg-gray-800/50 font-medium py-2.5 px-6 rounded-lg transition">
            Ghost
        </button>

        <!-- 9. Soft - Light background tint -->
        <button class="bg-blue-800 hover:bg-blue-700 text-blue-200 font-medium py-2.5 px-6 rounded-lg transition">
            Soft
        </button>

        <!-- 10. Primary Alt - Another filled variant -->
        <button class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2.5 px-6 rounded-lg transition">
            Action
        </button>

    </div>
</body>

</html>
