<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 Tailwind CSS Button Styles</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-12">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center">10 Button Styles - Tailwind CSS</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

            <!-- 1. PRIMARY - Filled -->
            <div class="bg-white rounded-xl p-6 shadow">
                <h3 class="font-semibold mb-3">Primary (Filled)</h3>
                <button
                    class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md transition">
                    Primary Button
                </button>
            </div>

            <!-- 2. SECONDARY - Outline -->
            <div class="bg-white rounded-xl p-6 shadow">
                <h3 class="font-semibold mb-3">Secondary (Outline)</h3>
                <button
                    class="px-6 py-2.5 border-2 border-purple-600 text-purple-700 hover:bg-purple-50 font-semibold rounded-lg transition">
                    Secondary Button
                </button>
            </div>

            <!-- 3. TERTIARY - Text only -->
            <div class="bg-white rounded-xl p-6 shadow">
                <h3 class="font-semibold mb-3">Tertiary (Text)</h3>
                <button
                    class="px-5 py-2 text-gray-700 hover:text-gray-900 hover:bg-gray-100 font-semibold rounded-lg transition">
                    Tertiary Button
                </button>
            </div>

            <!-- 4. DANGER - Filled Destructive -->
            <div class="bg-white rounded-xl p-6 shadow">
                <h3 class="font-semibold mb-3">Danger (Filled)</h3>
                <button
                    class="px-6 py-2.5 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg shadow-md transition">
                    Delete Item
                </button>
            </div>

            <!-- 5. SUCCESS - Filled Confirmation -->
            <div class="bg-white rounded-xl p-6 shadow">
                <h3 class="font-semibold mb-3">Success (Filled)</h3>
                <button
                    class="px-6 py-2.5 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg shadow-md transition flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    Confirm Action
                </button>
            </div>

            <!-- 6. FILLED VARIANT (Indigo) -->
            <div class="bg-white rounded-xl p-6 shadow">
                <h3 class="font-semibold mb-3">Style: Filled</h3>
                <button
                    class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg shadow transition">
                    Filled Button
                </button>
            </div>

            <!-- 7. OUTLINE VARIANT -->
            <div class="bg-white rounded-xl p-6 shadow">
                <h3 class="font-semibold mb-3">Style: Outline</h3>
                <button
                    class="px-6 py-2.5 border-2 border-cyan-600 text-cyan-700 hover:bg-cyan-50 font-medium rounded-lg transition">
                    Outline Button
                </button>
            </div>

            <!-- 8. GHOST VARIANT -->
            <div class="bg-white rounded-xl p-6 shadow">
                <h3 class="font-semibold mb-3">Style: Ghost</h3>
                <button class="px-5 py-2 text-slate-600 hover:bg-slate-100 font-medium rounded-lg transition">
                    Ghost Button
                </button>
            </div>

            <!-- 9. SOFT VARIANT (Light background tint) -->
            <div class="bg-white rounded-xl p-6 shadow">
                <h3 class="font-semibold mb-3">Style: Soft</h3>
                <button
                    class="px-6 py-2.5 bg-emerald-100 text-emerald-800 hover:bg-emerald-200 font-medium rounded-lg transition">
                    Soft Button
                </button>
            </div>

            <!-- 10. DANGER OUTLINE + SUCCESS OUTLINE (Combined) -->
            <div class="bg-white rounded-xl p-6 shadow">
                <h3 class="font-semibold mb-3">Outline Danger & Success</h3>
                <div class="flex gap-3 flex-wrap">
                    <button
                        class="px-5 py-2 border border-red-500 text-red-600 hover:bg-red-50 font-medium rounded-lg transition">
                        Delete
                    </button>
                    <button
                        class="px-5 py-2 border border-green-500 text-green-600 hover:bg-green-50 font-medium rounded-lg transition">
                        Approve
                    </button>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
