<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayode's 10 Button Types | Tailwind Only</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-8">

    <div class="max-w-5xl w-full">
        <!-- 10 Buttons Grid - Clean, Only Buttons -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">

            <!-- 1. PRIMARY - Filled -->
            <button
                class="px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold shadow-md transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 active:scale-[0.98]">
                Primary Action
            </button>

            <!-- 2. SECONDARY - Outline -->
            <button
                class="px-6 py-3 rounded-xl border-2 border-gray-300 bg-transparent text-gray-700 font-semibold hover:bg-gray-50 hover:border-gray-400 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2 active:scale-[0.98]">
                Secondary Action
            </button>

            <!-- 3. TERTIARY - Ghost (text only) -->
            <button
                class="px-6 py-3 rounded-xl text-gray-600 font-semibold hover:text-gray-900 hover:bg-gray-100 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:ring-offset-2 active:bg-gray-200">
                Tertiary Action
            </button>

            <!-- 4. DANGER - Filled -->
            <button
                class="px-6 py-3 rounded-xl bg-red-600 hover:bg-red-700 text-white font-semibold shadow-md transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 active:scale-[0.98]">
                Delete Item
            </button>

            <!-- 5. SUCCESS - Filled -->
            <button
                class="px-6 py-3 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-semibold shadow-md transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 active:scale-[0.98]">
                Confirm Action
            </button>

            <!-- 6. PRIMARY - Outline -->
            <button
                class="px-6 py-3 rounded-xl border-2 border-indigo-500 bg-transparent text-indigo-600 font-semibold hover:bg-indigo-50 hover:border-indigo-600 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:ring-offset-2">
                Upgrade Plan
            </button>

            <!-- 7. SECONDARY - Soft (light background tint) -->
            <button
                class="px-6 py-3 rounded-xl bg-blue-50 hover:bg-blue-100 text-blue-700 font-semibold transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-blue-200 focus:ring-offset-2 active:bg-blue-200">
                Learn More
            </button>

            <!-- 8. DANGER - Outline -->
            <button
                class="px-6 py-3 rounded-xl border-2 border-red-500 bg-transparent text-red-600 font-semibold hover:bg-red-50 hover:border-red-600 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-red-300 focus:ring-offset-2">
                Remove Item
            </button>

            <!-- 9. SUCCESS - Ghost -->
            <button
                class="px-6 py-3 rounded-xl text-emerald-600 font-semibold hover:text-emerald-800 hover:bg-emerald-50 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-emerald-200 focus:ring-offset-2 active:bg-emerald-100">
                Verified ✓
            </button>

            <!-- 10. TERTIARY - Soft (light background tint) -->
            <button
                class="px-6 py-3 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:ring-offset-2 active:bg-gray-300">
                More Options
            </button>

        </div>
    </div>

</body>

</html>
