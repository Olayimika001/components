<!DOCTYPE html>
<html>
<head>
  <title>Button Variants</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    /* Base Button */
    .btn {
      padding: 10px 18px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      margin: 5px;
      transition: 0.3s;
    }

    /* COLORS */
    .primary { background: #007bff; color: white; }
    .secondary { background: transparent; border: 2px solid #6c757d; color: #6c757d; }
    .success { background: #28a745; color: white; }
    .danger { background: #dc3545; color: white; }
    .tertiary { background: none; color: #007bff; }

    /* STYLE VARIANTS */

    /* Outline */
    .outline {
      background: transparent;
      border: 2px solid currentColor;
    }

    /* Ghost */
    .ghost {
      background: transparent;
      border: none;
      opacity: 0.7;
    }

    .ghost:hover {
      background: rgba(0,0,0,0.05);
      opacity: 1;
    }

    /* Soft */
    .soft-primary { background: rgba(0,123,255,0.1); color: #007bff; }
    .soft-success { background: rgba(40,167,69,0.1); color: #28a745; }
    .soft-danger { background: rgba(220,53,69,0.1); color: #dc3545; }

    /* Hover Effects */
    .btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<h3>Main Actions</h3>
<button class="btn primary">Primary</button>
<button class="btn success">Success</button>
<button class="btn danger">Danger</button>

<h3>Secondary & Tertiary</h3>
<button class="btn secondary">Secondary</button>
<button class="btn tertiary">Tertiary</button>

<h3>Outline Style</h3>
<button class="btn primary outline">Primary</button>
<button class="btn success outline">Success</button>
<button class="btn danger outline">Danger</button>

<h3>Ghost Style</h3>
<button class="btn primary ghost">Primary</button>
<button class="btn danger ghost">Danger</button>

<h3>Soft Style</h3>
<button class="btn soft-primary">Primary Soft</button>
<button class="btn soft-success">Success Soft</button>
<button class="btn soft-danger">Danger Soft</button>

</body>
</html>
